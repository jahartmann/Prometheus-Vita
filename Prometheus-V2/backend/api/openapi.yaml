openapi: 3.0.3
info:
  title: Prometheus V2 API
  version: 0.1.0
  description: Prometheus V2 Operations Cockpit API.
servers:
  - url: /api/v1
    description: Default V2 base path
paths:
  /system/health:
    get:
      summary: System health summary
      operationId: getSystemHealth
      tags: [system]
      responses:
        "200":
          description: System is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemHealth"
        "503":
          description: System is degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/login:
    post:
      summary: Log in with email + password
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Credentials"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/refresh:
    post:
      summary: Rotate session via refresh cookie
      operationId: refresh
      tags: [auth]
      responses:
        "200":
          description: New tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: No or expired session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      summary: Revoke current session
      operationId: logout
      tags: [auth]
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      summary: Current user
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    SystemHealth:
      type: object
      required: [status, version, request_id]
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        version:
          type: string
        request_id:
          type: string
    Error:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        request_id:
          type: string
    Credentials:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    AuthResponse:
      type: object
      required: [access_token, access_expires_at, user]
      properties:
        access_token:
          type: string
        access_expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, email, name, role, enabled]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [viewer, operator, admin]
        enabled:
          type: boolean
