services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prometheus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_db_password}
      POSTGRES_DB: ${POSTGRES_DB:-prometheus}
    # ports: expose only via docker-compose.override.yml for local dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prometheus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prometheus}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Conservative defaults for a small/medium Proxmox cluster. Adjust upward
    # when monitoring shows the DB needs more headroom.
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 256M

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_password} --maxmemory 256mb --maxmemory-policy allkeys-lru
    # ports: expose only via docker-compose.override.yml for local dev
    volumes:
      - redis_data:/data
    networks:
      - prometheus-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 384M

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles:
      - ai-local
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - prometheus-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prometheus-net
    # The Dockerfile's HEALTHCHECK already hits /live. We mirror it here so
    # compose users see the status without needing `docker inspect`.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 256M

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8080}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - prometheus-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Reverse proxy with TLS termination. Opt-in via `--profile tls`.
  # Set PROMETHEUS_HOSTNAME and (for production) CADDY_ACME_EMAIL plus
  # PROMETHEUS_TLS_MODE_DIRECTIVE=auto in .env.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles:
      - tls
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      PROMETHEUS_HOSTNAME: ${PROMETHEUS_HOSTNAME:-localhost}
      PROMETHEUS_TLS_SNIPPET: ${PROMETHEUS_TLS_SNIPPET:-tls_internal}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-admin@localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - prometheus-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://localhost/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Postgres backup sidecar. Opt-in via `--profile backup`.
  # Dumps go to the named volume `postgres_backups` which can be bind-mounted
  # to an off-host location for safety.
  # ---------------------------------------------------------------------------
  postgres-backup:
    image: postgres:17-alpine
    restart: unless-stopped
    profiles:
      - backup
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-prometheus}
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme_db_password}
      PGDATABASE: ${POSTGRES_DB:-prometheus}
      BACKUP_INTERVAL_S: ${BACKUP_INTERVAL_S:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - postgres_backups:/backup
      - ./scripts/backup:/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prometheus-net
    entrypoint: ["/bin/sh", "/scripts/pg-backup.sh"]

volumes:
  postgres_data:
  postgres_backups:
  redis_data:
  ollama_data:
  caddy_data:
  caddy_config:

networks:
  prometheus-net:
    driver: bridge
